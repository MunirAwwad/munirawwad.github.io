<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Munir's Personal Website</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="overlay-container"></div>
            <form id="email-form-overlay" style="display: none;" action="https://formspree.io/f/mknlwwkv" method="POST">
                <div id="email-form-header">
                    <span id="form-title">Email Me</span>
                    <span id="close-overlay">&#10006</span>
                </div>
                <div class="email-form-input-fields">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="Name" placeholder="Name" required>
                </div>
                <div class="email-form-input-fields">
                    <label for="email"><span class="no-wrap">Contact Email:</span></label>
                    <input type="email" id="email" name="Email" placeholder="Email" required>
                </div>
                <div class="email-form-input-fields">
                    <label for="company"><span class="no-wrap">Company Name (Optional):</span></label>
                    <input type="text" id="company" name="Company" placeholder="Company">
                </div>
                <div class="email-form-input-fields">
                    <label for="msg">Message:</label>
                    <textarea id="msg" name="Message" cols="50" rows="7" placeholder="Message" required></textarea>
                </div>
                <div id="form-buttons-container">
                    <button type="submit" name="submit" id="submit">Send</button>
                    <button id="clear-button" type="reset" name="reset" id="reset">Clear</button>
                </div>
                <p>Email handling powered by a third party service. Learn more at <a href="https://formspree.io/" target=”_blank”>https://formspree.io/</a>.</p>
            </form>
        </div>
        <div id="intro-box">
            <div id="intro-box-text">
                Hello, I'm Munir!
            </div>
            <div id="intro-box-sub-text">
                A third-year university student enrolled in the Honours Computer Science CO-OP program at McMaster University. Welcome to my website!
            </div>
            <div id="contact-box">
                <a href="https://www.linkedin.com/in/munirawwad/" target="_blank"><img src="logos/linkedin-logo.png" alt="linkedinLogo" height="40px" width="40px"></a>
                <a href="https://github.com/MunirAwwad/" target="_blank"><img src="logos/github-logo.png" alt="githubLogo" height="40px" width="40px"></a>
                <img id="email-me-button" src="logos/mail-logo.png" alt="githubLogo" height="40px" width="40px">
            </div>
        </div>
        <div id="nav-box">
            <a href="about.html"><button class="nav-button">About Me</button></a>
            <a href="projects.html"><button class="nav-button">Projects</button></a>
            <!-- <button class="nav-button">Resume</button> -->
        </div>
        <script src="index.js"></script>
    </body>
</html>
